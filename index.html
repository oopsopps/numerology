<style>
  :root {

    --green: #7BAE7F;
    --red: #D4756A;

  body { font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; background:var(--bg); color:var(--text); line-height:1.7; }

  .calc-container { max-width:1200px; margin:0 auto; padding:20px; }
  .calc-header { text-align:center; padding:30px 0 20px; }
  .calc-header h1 { font-size:2em; color:var(--accent); letter-spacing:0.05em; }
  .calc-header p { color:var(--muted); margin-top:6px; }

  .calc-main { display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }

  /* Grid panel */
  .grid-panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:30px; min-width:340px; box-shadow:0 2px 16px rgba(0,0,0,0.05); }
  .grid-panel h3 { color:var(--accent2); margin-bottom:16px; text-align:center; }

  .grid-wrapper { position:relative; width:300px; height:300px; margin:0 auto; }
  .grid-cell { position:absolute; width:80px; height:80px; display:flex; align-items:center; justify-content:center; font-size:1.8em; font-weight:700; color:var(--muted); transition:all .4s; }
  .grid-cell.has-circle { color:var(--text); }
  .grid-cell .circle-ring { position:absolute; width:74px; height:74px; border-radius:50%; border:3px solid var(--accent); opacity:0; transition:all .4s; left:50%; top:50%; transform:translate(-50%,-50%); }
  .grid-cell.has-circle .circle-ring { opacity:1; }
  .grid-cell .circle-count { position:absolute; bottom:2px; right:6px; font-size:0.4em; color:var(--accent2); opacity:0; }
  .grid-cell.has-circle .circle-count { opacity:1; }
  .grid-cell .score-label { position:absolute; top:2px; left:6px; font-size:0.35em; color:var(--warn); opacity:0; }
  .grid-cell.has-circle .score-label { opacity:1; }

  /* Connection lines via SVG */
  .grid-svg { position:absolute; top:0; left:0; width:300px; height:300px; pointer-events:none; }
  .conn-line { stroke:var(--accent); stroke-width:2.5; stroke-dasharray:6,4; opacity:0; transition:opacity .5s; fill:none; }
  .conn-line.active { opacity:0.7; }

  /* Input panel */
  .input-panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:30px; min-width:320px; max-width:400px; box-shadow:0 2px 16px rgba(0,0,0,0.05); }
  .input-panel h3 { color:var(--accent2); margin-bottom:16px; }
  .input-row { display:flex; gap:10px; margin-bottom:16px; }
  .input-group { flex:1; }
  .input-group label { display:block; font-size:0.85em; color:var(--muted); margin-bottom:4px; }
  .input-group input, .input-group select { width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1em; }
  .input-group input:focus, .input-group select:focus { outline:none; border-color:var(--accent); }
  .btn-calc { width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px; color:#fff; font-size:1.1em; font-weight:600; cursor:pointer; transition:all .2s; margin-top:8px; }
  .btn-calc:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,146,124,0.35); }
  .btn-calc:active { transform:translateY(0); }

  .info-box { margin-top:16px; padding:14px; background:var(--sand); border-radius:10px; font-size:0.9em; }
  .info-box .info-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border); }
  .info-box .info-row:last-child { border-bottom:none; }
  .info-label { color:var(--muted); }
  .info-value { font-weight:600; color:var(--accent2); }

  /* Score legend */
  .score-legend { margin-top:16px; font-size:0.82em; color:var(--muted); }
  .score-legend table { width:100%; border-collapse:collapse; margin-top:6px; }
  .score-legend th, .score-legend td { padding:4px 8px; border:1px solid var(--border); text-align:center; font-size:0.9em; }
  .score-legend th { background:var(--accent); color:#fff; }

  /* Connections list */
  .conn-list { margin-top:16px; }
  .conn-tag { display:inline-block; padding:3px 10px; margin:3px; border-radius:20px; font-size:0.82em; background:rgba(232,146,124,0.12); color:var(--accent2); border:1px solid rgba(232,146,124,0.3); }
  .conn-tag.inactive { background:transparent; color:var(--muted); border-color:var(--border); opacity:0.4; }

  /* === Analysis Section === */
  .analysis-section { max-width:1200px; margin:30px auto; padding:0 20px; }
  .analysis-section h2 { font-size:1.5em; padding:12px 18px; background:var(--sand); color:var(--accent2); border-radius:8px; margin-bottom:20px; }
  .analysis-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,0.04); }

  .analysis-card h4 { color:var(--text); margin:12px 0 6px; font-size:1em; }
  .energy-table { width:100%; border-collapse:collapse; margin:8px 0; }
  .energy-table th, .energy-table td { padding:8px 12px; border:1px solid var(--border); text-align:left; font-size:0.92em; }
  .energy-table th { background:var(--accent); color:#fff; }
  .energy-empty { background:rgba(123,164,196,0.1); }
  .energy-ok { background:rgba(123,174,127,0.1); }
  .energy-excess { background:rgba(212,117,106,0.1); }
  .tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.8em; margin:2px; }
  .tag-pos { background:rgba(123,174,127,0.15); color:#4A7A4E; }
  .tag-neg { background:rgba(212,117,106,0.15); color:#A0524A; }
  .num-badge { display:inline-block; width:32px; height:32px; line-height:32px; text-align:center; border-radius:50%; background:var(--accent); color:#fff; font-weight:700; font-size:1em; margin-right:6px; }

    .calc-main { flex-direction:column; align-items:center; }
    .grid-panel, .input-panel { min-width:auto; width:100%; max-width:400px; }

        </div>

  </div>
</div>

// Grid position map (vertical layout: 1,4,7 / 2,5,8 / 3,6,9)
// row, col -> pixel position in 300x300
const GRID_POS = {};
const LAYOUT = [[1,4,7],[2,5,8],[3,6,9]];
LAYOUT.forEach((row, r) => {
  row.forEach((num, c) => {
    GRID_POS[num] = { x: 40 + c * 110, y: 40 + r * 110 };
  });
});

// ============================================================
// ZODIAC
// ============================================================
function getZodiac(m, d) {
  if ((m==12&&d>=22)||(m==1&&d<=19)) return {num:1, name:"摩羯座"};
  if ((m==1&&d>=20)||(m==2&&d<=18)) return {num:2, name:"水瓶座"};
  if ((m==2&&d>=19)||(m==3&&d<=20)) return {num:3, name:"雙魚座"};
  if ((m==3&&d>=21)||(m==4&&d<=19)) return {num:1, name:"牡羊座"};
  if ((m==4&&d>=20)||(m==5&&d<=20)) return {num:2, name:"金牛座"};
  if ((m==5&&d>=21)||(m==6&&d<=20)) return {num:3, name:"雙子座"};
  if ((m==6&&d>=21)||(m==7&&d<=22)) return {num:4, name:"巨蟹座"};
  if ((m==7&&d>=23)||(m==8&&d<=22)) return {num:5, name:"獅子座"};
  if ((m==8&&d>=23)||(m==9&&d<=22)) return {num:6, name:"處女座"};
  if ((m==9&&d>=23)||(m==10&&d<=22)) return {num:7, name:"天秤座"};
  if ((m==10&&d>=23)||(m==11&&d<=21)) return {num:8, name:"天蠍座"};
  if ((m==11&&d>=22)||(m==12&&d<=21)) return {num:9, name:"射手座"};
  return {num:0, name:"?"};
}

// ============================================================
// INIT GRID VISUALS
// ============================================================
function initGrid() {
  const wrapper = document.getElementById('gridWrapper');
  // Create cells
  for (let num = 1; num <= 9; num++) {
    const pos = GRID_POS[num];
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.id = 'cell-' + num;
    cell.style.left = (pos.x - 40) + 'px';
    cell.style.top = (pos.y - 40) + 'px';
    cell.innerHTML = '<div class="circle-ring"></div><span class="cell-num">' + num + '</span><span class="circle-count" id="count-' + num + '"></span><span class="score-label" id="score-' + num + '"></span>';
    wrapper.appendChild(cell);
  }

  // Create SVG lines (hidden by default)
  const svg = document.getElementById('gridSvg');
  for (const [key, conn] of Object.entries(CONNECTIONS)) {
    const nums = conn.nums;
    const points = nums.map(n => GRID_POS[n]);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    if (nums.length === 2) {
      line.setAttribute('x1', points[0].x); line.setAttribute('y1', points[0].y);
      line.setAttribute('x2', points[1].x); line.setAttribute('y2', points[1].y);
    } else {
      // For 3-number lines, create a polyline
    }
    // Use polyline for all
    const pl = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    pl.setAttribute('points', points.map(p => p.x + ',' + p.y).join(' '));
    pl.setAttribute('class', 'conn-line');
    pl.id = 'line-' + key;
    svg.appendChild(pl);
  }
}

// ============================================================
// CALCULATE
// ============================================================
function calculate() {
  const year = parseInt(document.getElementById('inputYear').value);
  const month = parseInt(document.getElementById('inputMonth').value);
  const day = parseInt(document.getElementById('inputDay').value);

  if (!year || !month || !day) {
    alert('請選擇完整的年、月、日');
    return;
  }

  // Validate date
  const testDate = new Date(year, month - 1, day);
  if (testDate.getFullYear() !== year || testDate.getMonth() !== month - 1 || testDate.getDate() !== day) {
    alert('日期無效，請確認月份和日期');
    return;
  }

  const ds = String(year).padStart(4,'0') + String(month).padStart(2,'0') + String(day).padStart(2,'0');
  const digits = ds.split('').map(Number);

  // 1. Innate numbers
  const innate = digits.filter(d => d !== 0);
  const innateCounts = {};
  innate.forEach(d => { innateCounts[d] = (innateCounts[d] || 0) + 1; });

  // 2. Life path
  let total = digits.reduce((a,b) => a+b, 0);
  let chain = [total];
  let t = total;
  while (t > 9) {
    if ([11,22,33,44].includes(t)) break;
    t = String(t).split('').map(Number).reduce((a,b) => a+b, 0);
    chain.push(t);
  }
  const lifeNumber = chain[chain.length - 1];
  const isMaster = [11,22,33,44].includes(lifeNumber);

  // 3. Talent number (for display only, NOT in grid)
  let talentNum = null;
  if (chain[0] >= 10 && chain[0] <= 99 && ![11,22,33,44].includes(chain[0])) {
    talentNum = chain[0];
  } else if (chain.length > 1 && chain[0] > 99) {
    // Find first two-digit non-master
    for (let i = 0; i < chain.length; i++) {
      if (chain[i] >= 10 && chain[i] <= 99 && ![11,22,33,44].includes(chain[i])) {
        talentNum = chain[i]; break;
      }
    }
  }

  // 4. Zodiac
  const zodiac = getZodiac(month, day);

  // 5. Fixed number
  const fixedDigits = (String(month).padStart(2,'0') + String(day).padStart(2,'0')).split('').map(Number);
  let fixedTotal = fixedDigits.reduce((a,b) => a+b, 0);
  while (fixedTotal > 9) {
    fixedTotal = String(fixedTotal).split('').map(Number).reduce((a,b) => a+b, 0);
  }

  // 6. Grid circles (innate + life/master + zodiac ONLY)
  const circles = {};
  const sources = {};
  for (let i = 1; i <= 9; i++) { circles[i] = 0; sources[i] = []; }

  // Innate
  innate.forEach(d => { circles[d]++; sources[d].push('先天'); });

  // Life path / Master
  if (isMaster) {
    const md = Math.floor(lifeNumber / 10);
    circles[md] += 2;
    sources[md].push('大師數' + lifeNumber);
  } else {
    circles[lifeNumber]++;
    sources[lifeNumber].push('主命數');
  }

  // Zodiac
  circles[zodiac.num]++;
  sources[zodiac.num].push('星座');

  // 7. Calculate scores
  const scoreMap = {1: 30, 2: 60, 3: 100};
  const scores = {};
  for (let i = 1; i <= 9; i++) {
    let s = 0;
    const ic = innateCounts[i] || 0;
    if (ic > 0) s += scoreMap[Math.min(ic, 3)] || (ic * 30);
    if (isMaster && i === Math.floor(lifeNumber / 10)) s += 100;
    if (!isMaster && i === lifeNumber) s += 100;
    if (i === zodiac.num) s += 70;
    scores[i] = s;
  }

  // 8. Check connections
  const activeConns = [];
  for (const [key, conn] of Object.entries(CONNECTIONS)) {
    if (conn.nums.every(n => circles[n] > 0)) {
      activeConns.push(key);
    }
  }

  // === UPDATE UI ===
  updateGrid(circles, scores, activeConns);
  updateInfo(lifeNumber, isMaster, talentNum, zodiac, fixedTotal, sources);
  updateConnList(activeConns);
  updateAnalysis(circles, sources, scores, lifeNumber, isMaster, zodiac, fixedTotal, activeConns);
}

function updateGrid(circles, scores, activeConns) {
  for (let i = 1; i <= 9; i++) {
    const cell = document.getElementById('cell-' + i);
    const countEl = document.getElementById('count-' + i);
    const scoreEl = document.getElementById('score-' + i);

    if (circles[i] > 0) {
      cell.classList.add('has-circle');
      countEl.textContent = '×' + circles[i];
      scoreEl.textContent = scores[i] + '分';
      // Multiple circles: add extra rings
      cell.querySelectorAll('.extra-ring').forEach(r => r.remove());
      for (let r = 1; r < circles[i]; r++) {
        const ring = document.createElement('div');
        ring.className = 'circle-ring extra-ring';
        ring.style.width = (74 + r * 12) + 'px';
        ring.style.height = (74 + r * 12) + 'px';
        ring.style.opacity = '1';
        ring.style.borderColor = 'rgba(139,92,246,' + (0.7 - r * 0.15) + ')';
        ring.style.position = 'absolute';
        ring.style.left = '50%';
        ring.style.top = '50%';
        ring.style.transform = 'translate(-50%, -50%)';
        ring.style.borderRadius = '50%';
        ring.style.border = '2px solid';
        cell.appendChild(ring);
      }
    } else {
      cell.classList.remove('has-circle');
      countEl.textContent = '';
      scoreEl.textContent = '';
      cell.querySelectorAll('.extra-ring').forEach(r => r.remove());
    }
  }

  // Lines
  for (const key of Object.keys(CONNECTIONS)) {
    const line = document.getElementById('line-' + key);
    if (line) {
      line.classList.toggle('active', activeConns.includes(key));
    }
  }
}

  } else {
    document.getElementById('infoTalent').textContent = isMaster ? '（大師數，無獨立天賦數）' : '—';
